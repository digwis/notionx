name: release

on:
  push:
    branches: [main]
    paths:
      - "packages/nextion/**"
      - "packages/create-nextion-app/**"
      - ".changeset/**"
      - ".github/workflows/release.yml"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build nextion
        run: pnpm --filter @notionx/core build
      - name: Build create-nextion-app
        run: pnpm --filter create-nextion-app build

      # One-shot: version + publish inside the same workflow run so
      # solo / fast-iteration developers never have to merge a
      # "Version Packages" PR. changesets-action consumes the
      # `.changeset/*.md` files, bumps `package.json` versions in
      # place, runs the publish script, and writes a single
      # `chore(release): version packages` commit on the current
      # branch. We push that commit back to main at the end of the
      # job so the version bump lands in the repo history.
      - name: Version + publish packages (changesets)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm -r publish --no-git-checks --tag latest
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
