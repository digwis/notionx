name: release

on:
  push:
    branches: [main]
    paths:
      - "packages/nextion/**"
      - "packages/create-nextion-app/**"
      - "packages/nextion-skill/**"
      - ".changeset/**"
      - ".github/workflows/release.yml"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build nextion
        run: pnpm --filter @notionx/core build
      - name: Build create-nextion-app
        run: pnpm --filter @notionx/create-nextion-app build
      - name: Build nextion-skill
        run: pnpm --filter @notionx/skill build

      - name: Detect pending changesets
        id: pending_changesets
        run: |
          if find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      # Manual version + publish (replaces `changesets/action@v1`,
      # which can't deal with this monorepo: the version step tries
      # to import the built `dist/index.js` of each workspace package
      # in order to read its current changelog, and `@notionx/core`'s
      # dist pulls in `next/server` — a subpath that the `next`
      # package's exports map exposes only as `next/server.js`, so
      # Node ESM refuses to resolve it and the action exits 1 before
      # doing any bumping).
      #
      # We do the same thing in explicit steps so each failure mode
      # is easy to read in the CI log:
      #
      #   1. `pnpm changeset version` consumes `.changeset/*.md`,
      #      updates `package.json` versions in place, and (because
      #      `.changeset/config.json` sets `changelog: false`) does
      #      NOT try to write CHANGELOG.md — so no package import.
      #   2. We commit + push the version bump back to `main`, making
      #      GitHub the release source of truth before any npm writes.
      #   3. We configure npm auth from whichever secret name is
      #      populated (NPM_TOKEN / NPM_AUTH_TOKEN / NODE_AUTH_TOKEN).
      #   4. `scripts/publish-packages.mjs` publishes only package
      #      versions that are not already visible on npm, so reruns
      #      can recover from partial publishes safely.
      - name: Consume changesets and bump versions
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: pnpm changeset version

      - name: Commit + push version bump
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # Defense in depth: if any local-only file (`./.npmrc`
          # written by an older workflow revision, scratch files
          # etc.) was inadvertently staged, drop it before the
          # commit. The version bump is fully described by
          # `pnpm changeset version`'s output (deleted .changeset
          # entries + bumped package.json + bumped CHANGELOG.md),
          # and nothing else should ever ride along.
          git reset HEAD -- .npmrc 2>/dev/null || true
          echo "--- staged files ---"
          git diff --cached --stat
          echo "--------------------"
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): version packages"
            # `--no-verify` is required because the husky pre-push
            # hook runs `pnpm release:status` (the changeset check).
            # That check is meant to catch *human* pushes that bump
            # code without a changeset; the auto-generated version
            # bump commit IS the result of the changesets just being
            # consumed one step earlier, so requiring a changeset
            # here would be a circular dependency and would silently
            # block every release.
            git push --no-verify origin HEAD:main
          else
            echo "No version bump to commit — nothing to push."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure npm auth
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          echo "NPM_TOKEN set:         $([ -n "$NPM_TOKEN" ] && echo yes || echo no)"
          echo "NPM_AUTH_TOKEN set:    $([ -n "$NPM_AUTH_TOKEN" ] && echo yes || echo no)"
          echo "NODE_AUTH_TOKEN set:   $([ -n "$NODE_AUTH_TOKEN" ] && echo yes || echo no)"

          TOKEN="${NPM_TOKEN:-${NPM_AUTH_TOKEN:-${NODE_AUTH_TOKEN:-}}}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No npm registry token found in secrets NPM_TOKEN / NPM_AUTH_TOKEN / NODE_AUTH_TOKEN. Add one in the repo's Settings → Secrets and variables → Actions."
            exit 1
          fi

          printf '//registry.npmjs.org/:_authToken=%s\n' "$TOKEN" > "$HOME/.npmrc"
          echo "Auth configured in ~/.npmrc (token length: ${#TOKEN})."

      - name: Publish packages
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: node scripts/publish-packages.mjs
