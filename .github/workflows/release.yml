name: release

on:
  push:
    branches: [main]
    paths:
      - "packages/nextion/**"
      - "packages/create-nextion-app/**"
      - "packages/nextion-skill/**"
      - ".changeset/**"
      - ".github/workflows/release.yml"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build nextion
        run: pnpm --filter @notionx/core build
      - name: Build create-nextion-app
        run: pnpm --filter @notionx/create-nextion-app build
      - name: Build nextion-skill
        run: pnpm --filter @notionx/skill build

      - name: Detect pending changesets
        id: pending_changesets
        run: |
          if find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: pnpm changeset version

      - name: Commit version changes
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): version packages"

      - name: Push version commit back to main
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages
        if: steps.pending_changesets.outputs.has_changesets == 'true'
        run: pnpm -r publish --no-git-checks --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
